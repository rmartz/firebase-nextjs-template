name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      stories_changed: ${{ steps.classify.outputs.stories_changed }}
      package_changed: ${{ steps.classify.outputs.package_changed }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: classify
        name: Classify changed files
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "stories_changed=true" >> "$GITHUB_OUTPUT"
            echo "package_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.sha }}"
          changed="$(git diff --name-only "$base"..."$head")"
          printf 'Changed files:\n%s\n' "$changed"
          # A changed Storybook story implies an intended visual change worth
          # validating with a fresh screenshot.
          if printf '%s\n' "$changed" | grep -Eq '\.stories\.(ts|tsx)$'; then
            stories_changed=true
          else
            stories_changed=false
          fi
          echo "stories_changed=$stories_changed" >> "$GITHUB_OUTPUT"
          # The pin-format check reads only package.json (plus its own validator),
          # so it need only run when one of those changes.
          if printf '%s\n' "$changed" | grep -Eq '(^|/)package\.json$|^scripts/validate-pins\.mjs$'; then
            package_changed=true
          else
            package_changed=false
          fi
          echo "package_changed=$package_changed" >> "$GITHUB_OUTPUT"
          printf 'Resolved: stories_changed=%s package_changed=%s\n' "$stories_changed" "$package_changed"

  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm lint

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm tsc

  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm run format:check

  docs:
    name: Docs (OKF)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm run docs:validate

  # Closed-input check: only package.json (and the validator itself) can affect
  # the result, so gate it on those changing rather than running every PR.
  pins:
    name: Pin format
    needs: detect-changes
    if: needs.detect-changes.outputs.package_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm run pins:validate

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm build

  # Advisory visual-acceptance aid: captures a screenshot of every story and
  # uploads them as an artifact. Runs only when a story changed (an intended
  # visual change worth eyeballing); `continue-on-error` keeps it non-blocking.
  # No concurrency group is needed — the artifact surface is per-run, so there
  # is no shared resource for concurrent PR runs to race on.
  storybook-screenshots:
    name: Storybook Screenshots
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.stories_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    continue-on-error: true
    env:
      STORYBOOK_DISABLE_TELEMETRY: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/playwright-chromium
      - name: Build Storybook
        run: pnpm build-storybook
      - name: Capture screenshots
        continue-on-error: true
        run: node scripts/capture-screenshots.mjs
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: storybook-screenshots
          path: screenshots/
          if-no-files-found: warn

  # Runs the Storybook stories as Vitest browser tests in real Chromium. Isolated
  # in its own job so only it pays the Playwright browser-install cost; the
  # install is retried to absorb transient apt/CDN failures.
  storybook-tests:
    name: Storybook Tests
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      STORYBOOK_DISABLE_TELEMETRY: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/playwright-chromium
      - run: pnpm test:storybook
