name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      stories_changed: ${{ steps.classify.outputs.stories_changed }}
      package_changed: ${{ steps.classify.outputs.package_changed }}
      workflows_changed: ${{ steps.classify.outputs.workflows_changed }}
      code_changed: ${{ steps.classify.outputs.code_changed }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - id: classify
        name: Classify changed files
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "stories_changed=true" >> "$GITHUB_OUTPUT"
            echo "package_changed=true" >> "$GITHUB_OUTPUT"
            echo "workflows_changed=true" >> "$GITHUB_OUTPUT"
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.sha }}"
          changed="$(git diff --name-only "$base"..."$head")"
          printf 'Changed files:\n%s\n' "$changed"
          # A changed Storybook story implies an intended visual change worth
          # validating with a fresh screenshot.
          if printf '%s\n' "$changed" | grep -Eq '\.stories\.(ts|tsx)$'; then
            stories_changed=true
          else
            stories_changed=false
          fi
          echo "stories_changed=$stories_changed" >> "$GITHUB_OUTPUT"
          # The pin-format check reads only package.json (plus its own validator),
          # so it need only run when one of those changes.
          if printf '%s\n' "$changed" | grep -Eq '(^|/)package\.json$|^scripts/validate-pins\.mjs$'; then
            package_changed=true
          else
            package_changed=false
          fi
          echo "package_changed=$package_changed" >> "$GITHUB_OUTPUT"
          # The action-pin check reads only workflow / composite-action YAML
          # (plus its own validator), so it need only run when one of those changes.
          if printf '%s\n' "$changed" | grep -Eq '^\.github/(workflows|actions)/|^scripts/validate-action-pins\.mjs$'; then
            workflows_changed=true
          else
            workflows_changed=false
          fi
          echo "workflows_changed=$workflows_changed" >> "$GITHUB_OUTPUT"
          # Documentation denylist: run the heavy jobs by default, skip only when
          # EVERY changed file is provably-inert docs (.md / .txt / LICENSE). A new
          # or unanticipated file type fails safe (runs the suite) rather than open.
          # Guard: public/ assets (e.g. robots.txt) are never inert — they affect
          # production output regardless of extension, so short-circuit before the
          # denylist has a chance to match their .txt suffix.
          doc_regex='(^|/)LICENSE$|\.(md|txt)$'
          if printf '%s\n' "$changed" | grep -Eq '^public/' || \
             printf '%s\n' "$changed" | grep -Ev "$doc_regex" | grep -q .; then
            code_changed=true
          else
            code_changed=false
          fi
          echo "code_changed=$code_changed" >> "$GITHUB_OUTPUT"
          printf 'Resolved: stories_changed=%s package_changed=%s workflows_changed=%s code_changed=%s\n' "$stories_changed" "$package_changed" "$workflows_changed" "$code_changed"

  tests:
    name: Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: pnpm test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: pnpm lint

  typecheck:
    name: Type check
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: pnpm tsc

  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: pnpm run format:check

  docs:
    name: Docs (OKF)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: pnpm run docs:validate

  # Agent-legibility metrics (epic #161). REPORT-ONLY: this job always passes; it
  # prints the edit-fragility (anchor-uniqueness) table to the log and the PR's
  # check summary so we can watch the distribution and calibrate a threshold
  # before any of these becomes a gate. Seed of the "Codebase health" harness (#167).
  codebase-health:
    name: Codebase health (report-only)
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - name: Edit-fragility report
        run: |
          echo '### Edit-fragility (anchor-uniqueness) — report-only' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          pnpm run --silent fragility:report | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # Closed-input check: only package.json (and the validator itself) can affect
  # the result, so gate it on those changing rather than running every PR.
  pins:
    name: Pin format
    needs: detect-changes
    if: needs.detect-changes.outputs.package_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: pnpm run pins:validate

  # Closed-input check: only workflow / composite-action YAML (and the validator
  # itself) can affect the result, so gate it on those changing. Enforces that
  # every remote action stays pinned to a commit SHA (supply-chain hardening).
  action-pins:
    name: Action pins
    needs: detect-changes
    if: needs.detect-changes.outputs.workflows_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: pnpm run actions:validate

  build:
    name: Build
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: pnpm build

  # Gating compile check for the production Storybook bundle. This is a distinct
  # render surface from both the Next.js `build` job (different entrypoint and
  # bundler) and the Vitest-based `storybook-tests` job (which renders stories
  # through the addon-vitest transform and never runs `storybook build`). It is
  # gated on the broad `code_changed` denylist — not `stories_changed` — so a
  # `.storybook/` preset, preview decorator, or addon change that breaks the
  # bundle is caught even when no `.stories.` file changed.
  storybook-build:
    name: Storybook Build
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 4
    env:
      STORYBOOK_DISABLE_TELEMETRY: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: pnpm build-storybook

  # Advisory visual-acceptance aid: captures a screenshot of every story and
  # uploads them as an artifact. Runs only when a story changed (an intended
  # visual change worth eyeballing); `continue-on-error` keeps it non-blocking.
  # No concurrency group is needed — the artifact surface is per-run, so there
  # is no shared resource for concurrent PR runs to race on.
  storybook-screenshots:
    name: Storybook Screenshots
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.stories_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    continue-on-error: true
    env:
      STORYBOOK_DISABLE_TELEMETRY: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/playwright-chromium
      - name: Build Storybook
        run: pnpm build-storybook
      - name: Capture screenshots
        # No step-level continue-on-error: a capture failure (a broken or slow
        # story) must surface as a job *failure* so the coordinator routes it to
        # fix-review. The script fails fast — stories run concurrently with a
        # short per-story render budget and an overall wall-clock deadline below
        # this job's timeout-minutes — so the job never hits its timeout and gets
        # *cancelled* (which escalates to a human instead). The job-level
        # continue-on-error above still keeps the failure non-blocking for the run.
        run: node scripts/capture-screenshots.mjs
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: storybook-screenshots
          path: screenshots/
          if-no-files-found: warn

  # Runs the Storybook stories as Vitest browser tests in real Chromium. Isolated
  # in its own job so only it pays the Playwright browser-install cost; the
  # install is retried to absorb transient apt/CDN failures.
  storybook-tests:
    name: Storybook Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      STORYBOOK_DISABLE_TELEMETRY: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/playwright-chromium
      - run: pnpm test:storybook
