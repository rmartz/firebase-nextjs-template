name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm lint

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm tsc

  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm run format:check

  docs:
    name: Docs (OKF)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm run docs:validate

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm build

  storybook:
    name: Storybook Build
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      STORYBOOK_DISABLE_TELEMETRY: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm build-storybook

  # Runs the Storybook stories as Vitest browser tests in real Chromium. Isolated
  # in its own job so only it pays the Playwright browser-install cost; the
  # install is retried to absorb transient apt/CDN failures.
  storybook-tests:
    name: Storybook Tests
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      STORYBOOK_DISABLE_TELEMETRY: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Install Playwright Chromium
        run: |
          for i in 1 2 3; do
            if pnpm exec playwright install --with-deps chromium; then
              exit 0
            fi
            echo "playwright install attempt $i failed; retrying in 10s..." >&2
            sleep 10
          done
          echo "playwright install failed after 3 attempts" >&2
          exit 1
      - run: pnpm test:storybook
