name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      stories_changed: ${{ steps.classify.outputs.stories_changed }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: classify
        name: Classify changed files
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "stories_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.sha }}"
          changed="$(git diff --name-only "$base"..."$head")"
          printf 'Changed files:\n%s\n' "$changed"
          # A changed Storybook story implies an intended visual change worth
          # validating with a fresh screenshot.
          if printf '%s\n' "$changed" | grep -Eq '\.stories\.(ts|tsx)$'; then
            stories_changed=true
          else
            stories_changed=false
          fi
          echo "stories_changed=$stories_changed" >> "$GITHUB_OUTPUT"
          printf 'Resolved: stories_changed=%s\n' "$stories_changed"

  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm lint

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm tsc

  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm run format:check

  docs:
    name: Docs (OKF)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm run docs:validate

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm build

  # Advisory visual-acceptance aid: captures a screenshot of every story and
  # uploads them as an artifact. Runs only when a story changed (an intended
  # visual change worth eyeballing); `continue-on-error` keeps it non-blocking.
  # No concurrency group is needed — the artifact surface is per-run, so there
  # is no shared resource for concurrent PR runs to race on.
  storybook-screenshots:
    name: Storybook Screenshots
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.stories_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    continue-on-error: true
    env:
      STORYBOOK_DISABLE_TELEMETRY: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Install Playwright Chromium
        # Retry: `--with-deps` runs apt-get, which can fail on a transient runner
        # repo hiccup; scope the retry to this known-flaky install step only.
        run: |
          for attempt in 1 2 3; do
            if pnpm exec playwright install --with-deps chromium; then
              exit 0
            fi
            echo "Playwright install attempt $attempt failed; retrying in 15s..." >&2
            sleep 15
          done
          echo "Playwright install failed after 3 attempts." >&2
          exit 1
      - name: Build Storybook
        run: pnpm build-storybook
      - name: Capture screenshots
        continue-on-error: true
        run: node scripts/capture-screenshots.mjs
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storybook-screenshots
          path: screenshots/
          if-no-files-found: warn

  # Runs the Storybook stories as Vitest browser tests in real Chromium. Isolated
  # in its own job so only it pays the Playwright browser-install cost; the
  # install is retried to absorb transient apt/CDN failures.
  storybook-tests:
    name: Storybook Tests
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      STORYBOOK_DISABLE_TELEMETRY: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Install Playwright Chromium
        run: |
          for i in 1 2 3; do
            if pnpm exec playwright install --with-deps chromium; then
              exit 0
            fi
            echo "playwright install attempt $i failed; retrying in 10s..." >&2
            sleep 10
          done
          echo "playwright install failed after 3 attempts" >&2
          exit 1
      - run: pnpm test:storybook
