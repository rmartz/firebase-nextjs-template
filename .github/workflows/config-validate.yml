name: Config Validation

# Closed-input check: the result depends only on the deployment config and its
# validator, so run it only when one of those changes.
on:
  pull_request:
    paths:
      - "deployment/**"
      - "scripts/validate-config.mjs"
  push:
    branches: [main]
    paths:
      - "deployment/**"
      - "scripts/validate-config.mjs"

permissions:
  contents: read

jobs:
  validate-config:
    name: Validate deployment config
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: node scripts/validate-config.mjs
