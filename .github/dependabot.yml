version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # Let updates age before opening a PR, reducing exposure to compromised
    # releases (supply-chain attacks) that are typically yanked within days.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      dev-dependencies:
        dependency-type: development
        patterns:
          - "*"
      production-dependencies:
        dependency-type: production
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Let updates age before opening a PR, reducing exposure to compromised
    # releases (supply-chain attacks) that are typically yanked within days.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
      include: "scope"
