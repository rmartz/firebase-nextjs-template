version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # Let updates age before opening a PR, reducing exposure to compromised
    # releases (supply-chain attacks) that are typically yanked within days.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      # Version-locked families. Each is a set of packages that ship on a shared
      # version line (or whose majors are dictated by one member), so a bump to
      # one that is not matched by the rest breaks the build. Listed first to win
      # group-assignment precedence.
      #
      # Scope of update-types differs by whether the family crosses the dev/prod
      # boundary:
      #  - An all-dev or all-prod family only needs a group for MAJOR bumps. Its
      #    minor/patch bumps are already lockstep because every member falls into
      #    the same catch-all group (dev-dependencies or production-dependencies),
      #    so they batch into that one PR. MAJOR is the only bump type those
      #    catch-alls exclude (majors are ungrouped -> individual PRs), so it is
      #    the only case that would split a same-category family apart. Restricting
      #    these to `major` keeps their routine minor/patch bumps in the shared
      #    batch PR instead of spawning a dedicated family PR every release.
      #  - A family that spans prod AND dev (react) needs ALL update types: its
      #    minor/patch would otherwise scatter react/react-dom (prod) from their
      #    @types (dev) across the two catch-all PRs, breaking lockstep.
      react:
        # Spans prod (react, react-dom) and dev (@types) -> all update types, so
        # react/react-dom never drift from their @types across the prod/dev split.
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      storybook:
        # Every @storybook/* package, the storybook CLI, and the eslint plugin
        # share one Storybook version line — a Storybook major must move them all.
        patterns:
          - "storybook"
          - "@storybook/*"
          - "eslint-plugin-storybook"
        update-types:
          - "major"
      vite:
        # vite + its react plugin + vitest + @vitest/* are one interlocked
        # toolchain: a vite major dictates the plugin and vitest majors (the
        # @vitejs/plugin-react 6 -> vite 8 coupling), so bump them together.
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
          - "@vitest/*"
        update-types:
          - "major"
      eslint:
        # eslint + @eslint/js share a version line; typescript-eslint and the
        # react-hooks plugin track the eslint major.
        patterns:
          - "eslint"
          - "@eslint/js"
          - "typescript-eslint"
          - "eslint-plugin-react-hooks"
        update-types:
          - "major"
      tailwind:
        # tailwindcss core + its postcss plugin ship in lockstep (both moved
        # 4.3.1 -> 4.3.2 together); a mismatch fails the build.
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
        update-types:
          - "major"
      # Prettier (and its plugins) drive formatting output, so a major or minor
      # bump can reformat the codebase and fail the Format check with no other
      # visible cause. Split those into their own PR — listed first to win
      # group-assignment precedence — for isolated review. Patch bumps are
      # trivial enough to ride along with the dev-dependencies group: omitting
      # "patch" here means a Prettier patch does not match this group and falls
      # through to dev-dependencies (minor/patch) below.
      prettier:
        patterns:
          - "prettier"
          - "prettier-plugin-*"
        update-types:
          - "major"
          - "minor"
      # Group only minor and patch bumps into one PR per dependency type. Major
      # bumps match no group and so are raised as individual PRs, isolating the
      # updates most likely to require code changes for handling on their own.
      dev-dependencies:
        dependency-type: development
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      production-dependencies:
        dependency-type: production
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Let updates age before opening a PR, reducing exposure to compromised
    # releases (supply-chain attacks) that are typically yanked within days.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
      include: "scope"
