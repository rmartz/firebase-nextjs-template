version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # Let updates age before opening a PR, reducing exposure to compromised
    # releases (supply-chain attacks) that are typically yanked within days.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      # Version-locked families. Each of these is a set of packages that ship on
      # a shared version line (or whose majors are dictated by one member), so a
      # bump to one that is not matched by a bump to the rest breaks the build.
      # They are grouped across ALL update types — major, minor, AND patch — and
      # listed first to win group-assignment precedence, so any bump within a
      # family lands as one atomic PR. (Update-types are deliberately unrestricted
      # here: a react patch without react-dom is as broken as a major, and the
      # prod/dev split would otherwise scatter react/react-dom from their @types.)
      react:
        # react + react-dom ship the same version and must move together; the
        # @types track react's major. Spans prod (react, react-dom) and dev (types).
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      storybook:
        # Every @storybook/* package, the storybook CLI, and the eslint plugin
        # share one Storybook version line — a Storybook major must move them all.
        patterns:
          - "storybook"
          - "@storybook/*"
          - "eslint-plugin-storybook"
      vite:
        # vite + its react plugin + vitest + @vitest/* are one interlocked
        # toolchain: a vite major dictates the plugin and vitest majors (the
        # @vitejs/plugin-react 6 -> vite 8 coupling), so bump them together.
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
          - "@vitest/*"
      eslint:
        # eslint + @eslint/js share a version line; typescript-eslint and the
        # react-hooks plugin track the eslint major.
        patterns:
          - "eslint"
          - "@eslint/js"
          - "typescript-eslint"
          - "eslint-plugin-react-hooks"
      tailwind:
        # tailwindcss core + its postcss plugin ship in lockstep (both moved
        # 4.3.1 -> 4.3.2 together); a mismatch fails the build.
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      # Prettier (and its plugins) drive formatting output, so a major or minor
      # bump can reformat the codebase and fail the Format check with no other
      # visible cause. Split those into their own PR — listed first to win
      # group-assignment precedence — for isolated review. Patch bumps are
      # trivial enough to ride along with the dev-dependencies group: omitting
      # "patch" here means a Prettier patch does not match this group and falls
      # through to dev-dependencies (minor/patch) below.
      prettier:
        patterns:
          - "prettier"
          - "prettier-plugin-*"
        update-types:
          - "major"
          - "minor"
      # Group only minor and patch bumps into one PR per dependency type. Major
      # bumps match no group and so are raised as individual PRs, isolating the
      # updates most likely to require code changes for handling on their own.
      dev-dependencies:
        dependency-type: development
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      production-dependencies:
        dependency-type: production
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Let updates age before opening a PR, reducing exposure to compromised
    # releases (supply-chain attacks) that are typically yanked within days.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
      include: "scope"
