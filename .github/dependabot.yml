version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # Let updates age before opening a PR, reducing exposure to compromised
    # releases (supply-chain attacks) that are typically yanked within days.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      # Group only minor and patch bumps into one PR per dependency type. Major
      # bumps match no group and so are raised as individual PRs, isolating the
      # updates most likely to require code changes for handling on their own.
      dev-dependencies:
        dependency-type: development
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      production-dependencies:
        dependency-type: production
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Let updates age before opening a PR, reducing exposure to compromised
    # releases (supply-chain attacks) that are typically yanked within days.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
      include: "scope"
