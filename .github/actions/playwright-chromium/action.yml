name: "Install Playwright Chromium"
description: "Cache-restore and install Chromium for Playwright, with a retry. Run after ./.github/actions/setup so pnpm and playwright resolve."

runs:
  using: "composite"
  steps:
    - id: cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        # Key on the lockfile hash (busts whenever any dependency — including
        # playwright — changes) with a coarse os-scoped restore-key for partial
        # reuse: on a bump the previous browser cache is restored and only a
        # changed browser re-downloads. The `-chromium-` prefix scopes the key
        # to this browser set so a job installing a different set cannot collide.
        key: playwright-chromium-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          playwright-chromium-${{ runner.os }}-
    - name: Install Chromium
      shell: bash
      # On an exact cache hit the ~130MB browser is already restored, so install
      # only the OS libraries (`install-deps`) and skip the download attempt;
      # otherwise do the full browser install. Either path shells apt and can hit
      # a transient runner/CDN hiccup, so scope a 3x retry around it.
      run: |
        if [ "${{ steps.cache.outputs.cache-hit }}" = "true" ]; then
          install="pnpm exec playwright install-deps chromium"
        else
          install="pnpm exec playwright install --with-deps chromium"
        fi
        for attempt in 1 2 3; do
          if $install; then
            exit 0
          fi
          echo "Playwright install attempt $attempt failed; retrying in 15s..." >&2
          sleep 15
        done
        echo "Playwright install failed after 3 attempts." >&2
        exit 1
